openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Bomato restaurant listing API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: restaurants
    description: Restaurant operations
  - name: menu
    description: Menu operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /restaurants:
    get:
      operationId: listRestaurants
      tags: [restaurants]
      summary: List all restaurants
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: cuisine
          schema:
            type: string
        - in: query
          name: priceLevel
          schema:
            type: integer
      responses:
        "200":
          description: List of restaurants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Restaurant"

  /restaurants/{id}:
    get:
      operationId: getRestaurant
      tags: [restaurants]
      summary: Get a restaurant by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Restaurant details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Restaurant"
        "404":
          description: Not found

  /restaurants/featured:
    get:
      operationId: getFeaturedRestaurants
      tags: [restaurants]
      summary: Get featured/top-rated restaurants
      responses:
        "200":
          description: Featured restaurants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Restaurant"

  /restaurants/cuisines:
    get:
      operationId: listCuisines
      tags: [restaurants]
      summary: List all available cuisine types
      responses:
        "200":
          description: List of cuisine strings
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /restaurants/{restaurantId}/menu:
    get:
      operationId: listMenuItems
      tags: [menu]
      summary: List menu items for a restaurant
      parameters:
        - in: path
          name: restaurantId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of menu items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MenuItem"
        "404":
          description: Restaurant not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Restaurant:
      type: object
      required:
        - id
        - name
        - imageUrl
        - rating
        - reviewCount
        - cuisines
        - priceLevel
        - address
        - isOpen
      properties:
        id:
          type: integer
        name:
          type: string
        imageUrl:
          type: string
        rating:
          type: number
          format: float
        reviewCount:
          type: integer
        cuisines:
          type: array
          items:
            type: string
        priceLevel:
          type: integer
        address:
          type: string
        deliveryTime:
          type: ["integer", "null"]
        isOpen:
          type: boolean
        isFeatured:
          type: ["boolean", "null"]

    MenuItem:
      type: object
      required:
        - id
        - restaurantId
        - name
        - description
        - price
        - category
      properties:
        id:
          type: integer
        restaurantId:
          type: integer
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: float
        category:
          type: string
        imageUrl:
          type: ["string", "null"]
        isPopular:
          type: ["boolean", "null"]
        isVegetarian:
          type: ["boolean", "null"]
