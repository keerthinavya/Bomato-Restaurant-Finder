kind = "web"
previewPath = "/"
title = "Bomato"
version = "1.0.0"
id = "artifacts/bomato"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21046

[services.development]
run = "pnpm --filter @workspace/bomato run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bomato", "run", "build" ]
publicDir = "artifacts/bomato/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21046"
BASE_PATH = "/"
